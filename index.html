<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <center><h2>To-Do List App <img src="images/icon.png"></h2></center>
            <br>
       <center> <div class="row">
            <input type="text" id="input-box" placeholder="Add tasks...">
            <input type="date" id="due-date">

              <!-- NEW: category -->
        <select id="category">
        <option value="General">General</option>
        <option value="Work">Work</option>
        <option value="Study">Study</option>
        <option value="Personal">Personal</option>
        </select>

      <!-- NEW: priority -->
        <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        </select>
            <button onclick="addTask()">Add</button> 
            </div>
            <!-- CIRCULAR PROGRESS -->
    <div class="circle-progress">
      <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" id="bg"></circle>
        <circle cx="60" cy="60" r="50" id="progress-circle"></circle>
      </svg>
      <div id="circle-text">0%</div>
    </div> </center>

    <button onclick="toggleDarkMode()">🌙</button>
    
            <ul id="list-container">
            <!--<li class="checked">Task 1</li>
            <li>Task 2</li>
            <li>Task 3</li> -->
            </ul>
        <br>
            <!-- 🤖 AI Assistant -->
        <div class="ai-box">
    <h3>🤖 AI Assistant</h3>
    <div id="ai-chat"></div>

    <div class="ai-input-row">
        <input type="text" id="ai-input" placeholder="Ask something...">
        <button onclick="askAI()">Send</button>
    </div>
    </div>
    <br>
    <button onclick="dailyPlan()">🎯 Plan My Day</button>
     <p id="plan-output"></p>
    </div>
    </div>
    
</body>
<script src="script.js"></script>
</html>
